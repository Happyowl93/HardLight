- author: wonderfulnewworld
  changes:
  - message: Senior Mail Technician Jumpsuit/Jumpskirt, Senior Mail Technician Visor, Senior Mail Technician Boots, Senior Mail Technician Trunk, Senior Mail PDA, Senior Mail Technician Mail Bag (60 Hours Mail Technician).
    type: Add
  - message: Mail Technician Jumpsuit/Jumpskirt, Mail Technician Visor (can be flipped), Mail Technician Boots.
    type: Add
  - message: Mail Technician Trunk. It's wider than a duffel, but only 4 spaces tall. Can hold 3 full packages, but it's 5% slower than the duffel.
    type: Add
  - message: Golden Mail Trolley Flatpack. (100 Hours Mail Technician).
    type: Add
  - message: Cargo Technicians now spawn with a cargo utility belt, allowing them to carry all of their paperwork on them. The appraisal tool now spawns in here. (Ported from Far Horizons, although with a tweaked whitelist. The sprite's different here, but I used FH's sprite as a reference for the color scheme.).
    type: Add
  - message: Cargo Technicians now spawn with a boxcutter in their belt.
    type: Add
  - message: Golden Appraisal Tool. (100 Hours Cargo Technician).
    type: Add
  - message: Added Mail Access!.
    type: Add
  - message: Added Mail Airlocks and Windoors.
    type: Add
  - message: Added Cargo Technician and Mail Technician Lockers.
    type: Add
  - message: Space Courier Bundle to the Fashion vendor, containing green versions of the above items. Comes in an equally luxurious Space Courier Trunk. There's something special about the one in the fashion vendor, too...
    type: Add
  - message: Stamps now have the Stamp tag.
    type: Add
  - message: Added Mail Technician Jumpsuit/Jumpskirt, Mail Visor, Mail Technician Boots, and a Cargo Utility Belt to the CargoDrobe.
    type: Add
  - message: Added a singular mail trunk to the MNGR wire CargoDrobe inventory.
    type: Add
  - message: You can now emag the CargoDrobe to get additional Salvage backpacks.
    type: Add
  - message: Mail Technicians now have their own loadout options for Head, Jumpsuit, Outer Clothing (nothing unique, yet), Boots, Backpack, PDA, Bag, and Trolley.
    type: Tweak
  - message: Cargo Technicians now have a loadout option for their Appraisal Tool.
    type: Tweak
  - message: The Mail Teleporter now requires Mail Access.
    type: Tweak
  - message: Renamed mailman.yml to mail_technician.yml to be consistent with naming scheme.
    type: Fix
  - message: Fixed Boxcutter only counting as Security contraband instead of Security-Cargo.
    type: Fix
  - message: All of Cargo gains access to the rest of Cargo minus Salv Lead/QM on skeleton crew.
    type: Fix
