- author: STARLIGHT TEAM
  changes:
  - message: Improved card UI significantly.
    type: Tweak
  - message: Added the Captain's mode specific card "War" with a 10% chance to appear. If accepted, a notification will announce the start of the war, along with an evacuation requirement to deliver at least 90% of the crew listed on the manifest to CentCom. In response, a dozen deserter cards are added to the pool, with the objective of hiding on the station. Deserters gain access to a hidden section in vending machines containing tools and smoke grenades.
    type: Add
  id: 396001
  time: '2026-03-27T21:05:51.000000+00:00'
  url: https://github.com/ss14Starlight/space-station-14/pull/3960
- author: redmushie
  changes:
  - message: End-of-round pacification is now only applied on the Evac shuttle and on CentComm. This makes it easier for station-ending antags and Security to keep doing what they have to do on station. EORG rules still apply.
    type: Tweak
  - message: Changelings and Vampires no longer accumulate hunger during EOR.
    type: Tweak
  - message: Various NT and CC jobs are now exempt from EOR pacification (such as ERT).
    type: Add
  - message: Emags and authentication disruptors no longer work while the user is EOR pacified.
    type: Add
  - message: Some damaging antagonist abilities are disabled while EOR pacified.
    type: Add
  id: 390201
  time: '2026-03-27T21:24:35.000000+00:00'
  url: https://github.com/ss14Starlight/space-station-14/pull/3902
