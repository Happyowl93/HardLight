# Senior Time
- type: loadoutEffectGroup
  id: SeniorPhysician
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobChemist
      time: 6h
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobMedicalDoctor
      time: 6h
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:DepartmentTimeRequirement
      department: Medical
      time: 60h

- type: loadout # afterlight start
  id: CoronerJumpskirt
  equipment:
    jumpsuit: ClothingUniformJumpskirtCoroner
  effects:
  - !type:GroupLoadoutEffect
    proto: SeniorPhysician

- type: loadout
  id: CoronerJumpsuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitCoroner
  effects:
  - !type:GroupLoadoutEffect
    proto: SeniorPhysician

- type: loadout
  id: CoronerJumpsuitAlt
  equipment:
    jumpsuit: ClothingUniformJumpsuitCoronerAlt
  effects:
  - !type:GroupLoadoutEffect
    proto: SeniorPhysician

- type: loadout
  id: NurseJumpskirt
  equipment:
    jumpsuit: ClothingUniformJumpskirtSuitNurse
  effects:
  - !type:GroupLoadoutEffect
    proto: SeniorPhysician

    # Eyewear
