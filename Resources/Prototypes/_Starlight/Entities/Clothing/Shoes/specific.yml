# Not galoshes, but still count towards the goal
- type: entity
  parent: [ ClothingShoesBase, BaseJanitorContraband ]
  id: ClothingShoesGaloshnt
  name: galoshes
  description: Specialized slippery rubber boots, designed to increase janitorial workplace accidents; a tider's nightmare.
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Specific/galoshes.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Specific/galoshes.rsi
  - type: StealTarget # Starlight
    stealGroup: GaloshesCollection # Starlight

- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesGreenLizardskin
  name: green lizardskin shoes
  description: They may have lost some of their lustre over the years, but these green lizardskin shoes fit you perfectly.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Shoes/Specific/disco.rsi
    - type: Clothing
      sprite: _Starlight/Clothing/Shoes/Specific/disco.rsi

- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesAerostatic
  name: aerostatic boots
  description: A crisp, clean set of boots for working long hours on the beat.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Shoes/Specific/kim.rsi
    - type: Clothing
      sprite: _Starlight/Clothing/Shoes/Specific/kim.rsi

- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingShoesSchoolBlack
  name: school black shoes
  description: Stylish and comfortable school shoes in dark color with stockings.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Shoes/Specific/schoolblackshoes.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/Shoes/Specific/schoolblackshoes.rsi

- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingShoesSchoolWhite
  name: school white shoes
  description: Stylish and comfortable school shoes in light color with stockings.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Shoes/Specific/schoolwhiteshoes.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/Shoes/Specific/schoolwhiteshoes.rsi
    
- type: entity
  parent: Clothing # cannot inherent from Clothing shoes as they don't have protectedfromsteptriggers
  id: ClothingShoesPaws
  name: Paw boots
  description: Special boots made specifically for Felionoid paws, the thin soles do not protect against sharp objects
  components:
    - type: Clothing
      sprite: Clothing/Shoes/Boots/workboots.rsi
      slots:
        - FEET
    - type: Sprite
      sprite: Clothing/Shoes/Boots/workboots.rsi
      state: icon
    - type: Item
      size: Normal
    - type: Edible
      requiresSpecialDigestion: true
    - type: SolutionContainerManager
      solutions:
        food:
          maxVol: 10
          reagents:
            - ReagentId: Fiber
              Quantity: 10
    - type: OverrideShoesHinder
      HinderModifier: 0 # times speed reduction by zero
    - type: Tag
      tags:
        - ClothMade
        - Recyclable
        - WhitelistChameleon