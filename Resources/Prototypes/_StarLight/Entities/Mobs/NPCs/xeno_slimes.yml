- type: entity
  id: XenoSlimeBase
  parent:
  - MobRespirator
  - MobAtmosStandard
  - SimpleSpaceMobBase
  abstract: true
  description: I don't think you should be seeing this.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Starlight/Mobs/XenoSlimes/test_sprite.rsi
    layers:
    - state: test_slime
  - type: Slime
    nutrition: 50
    nutritionChangePerSecond: -1
    damageOnEat:
      types:
        Cellular: 5
    nutritionOnHit: 10
    mutationChance: 0.25
  - type: HTN
    rootTask:
      task: SlimeEatCompound
  - type: Temperature
    coldDamage:
      types:
        Cold: 10.0

- type: entity
  name: gray xenobiology slime
  id: XenoSlimeGray
  parent: XenoSlimeBase
  description: GRAY
  components:
  - type: Slime
    splitInto: XenoSlimeGray
    extract: GraySlimeExtract
    splitIntoMutation:
    - XenoSlimeOrange
    - XenoSlimePurple
    - XenoSlimeBlue
  - type: Sprite
    color: "#999999ff"

- type: entity
  name: orange xenobiology slime
  id: XenoSlimeOrange
  parent: XenoSlimeBase
  description: ORANGE
  components:
    - type: Slime
      splitInto: XenoSlimeOrange
      extract: OrangeSlimeExtract
    - type: Sprite
      color: "#f07a26ff"

- type: entity
  name: purple xenobiology slime
  id: XenoSlimePurple
  parent: XenoSlimeBase
  description: PURPLE
  components:
    - type: Slime
      splitInto: XenoSlimePurple
      extract: PurpleSlimeExtract
    - type: Sprite
      color: "#501466ff"

- type: entity
  name: blue xenobiology slime
  id: XenoSlimeBlue
  parent: XenoSlimeBase
  description: BLUE
  components:
    - type: Slime
      splitInto: XenoSlimeBlue
      extract: BlueSlimeExtract
    - type: Sprite
      color: "#34cfebff"