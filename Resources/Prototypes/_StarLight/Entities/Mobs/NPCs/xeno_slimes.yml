  - MobRespirator
  - MobAtmosStandard
  - SimpleSpaceMobBase
  abstract: true
  description: I don't think you should be seeing this.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Starlight/Mobs/XenoSlimes/test_sprite.rsi
    layers:
