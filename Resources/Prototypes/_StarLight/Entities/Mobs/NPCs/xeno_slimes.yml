- type: entity
  id: XenoSlimeBase
  parent:
    - MobRespirator
    - MobAtmosStandard
    - SimpleSpaceMobBase
  abstract: true
  description: I don't think you should be seeing this.
  components:
    - type: Sprite
      drawdepth: Mobs
      sprite: _Starlight/Mobs/XenoSlimes/test_sprite.rsi
      layers:
        - state: test_slime
    - type: Slime
      nutrition: 50
      nutritionChangePerSecond: -1
      damageOnEat:
        types:
          Cellular: 5
      nutritionOnHit: 10
      mutationChance: 0.25
    - type: HTN
      rootTask:
        task: SlimeEatCompound
    - type: Temperature
      coldDamage:
        types:
          Cold: 10.0

- type: entity
  name: gray xenobiology slime
  id: XenoSlimeGray
  parent: XenoSlimeBase
  description: GRAY
  components:
    - type: Slime
      splitInto: XenoSlimeGray
      extract: GraySlimeExtract
      splitIntoMutation:
        - XenoSlimeOrange
        - XenoSlimePurple
        - XenoSlimeBlue
        - XenoSlimeMetal
    - type: Sprite
      color: "#999999ff"

