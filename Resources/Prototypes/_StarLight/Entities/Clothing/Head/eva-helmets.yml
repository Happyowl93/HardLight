#EVA Helmet
- type: entity
  parent: ClothingHeadEVAHelmetBase
  id: ClothingHeadSoftsuitCBURN
  name: CBURN helmet
  description: A pressure resistant and fireproof hood worn by special cleanup units.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/Head/Hardsuits/cburn.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
    - state: light-overlay
      visible: false
      shader: unshaded
      map: [ "light" ]
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-head
      - state: equipped-head-unshaded
        shader: unshaded
      head-vox:
      - state: equipped-head-vox
      - state: equipped-head-unshaded-vox
        shader: unshaded
    equipSound: /Audio/Mecha/mechmove03.ogg #starlight
    unequipSound: /Audio/Mecha/mechmove03.ogg #starlight
    equipDelay: 3 #starlight
    unequipDelay: 3 #starlight

- type: entity
  parent: [ClothingHeadEVAHelmetBase, ClothingHeadHelmetArmoredBase, BaseTSFContraband]
  id: ClothingHeadHelmetTSF
  name: Federation marine combat helmet
  description: A powered combat helmet used by the Trans-Solar Marine Corps. Provides excellent protection in all areas, while a modern OCULUS array augments the wearer's vision.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Head/Helmets/tsf.rsi
    - type: Clothing
      sprite: _Starlight/Clothing/Head/Helmets/tsf.rsi
      equipDelay: 3
      unequipDelay: 3
    - type: ShowJobIcons
    - type: ShowMindShieldIcons
    - type: EyeProtection
      protectionTime: 5
    - type: FlashImmunity

- type: entity
  parent: ClothingHeadHelmetTSF
  id: ClothingHeadHelmetTSFLeader
  name: Federation marine officer's combat helmet
  description: A powered combat helmet used by officers of the Trans-Solar Marine Corps. Provides excellent protection in all areas, while a next-gen OCULUS array augments the wearer's vision.
  components:
    - type: Sprite
      sprite: _Starlight/Clothing/Head/Helmets/tsfleader.rsi
    - type: Clothing
      sprite: _Starlight/Clothing/Head/Helmets/tsfleader.rsi