- type: entity
  id: BaseTicketMachine
  parent: [ BaseWallmountMachine ]
  abstract: true
  components:
  - type: TicketMachine
  - type: WallMount
  - type: Appearance
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Transform
    anchored: true
  - type: AccessReader
    access: [["Security"]]
  - type: DeviceList
  - type: DeviceNetwork
    deviceNetId: Wireless
  - type: DeviceLinkSink
    ports:
      - TicketMachineNextNumber
      - TicketMachineBurnTickets

- type: entity
  id: TicketMachine
  parent: BaseTicketMachine
  name: ticket machine
  description: It prints out numbered tickets for queue management.
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Machines/ticket_machine.rsi
    layers:
    - state: base
    - state: paper_1
      map: [ "enum.TicketMachineVisualLayers.Paper" ]
    - map: [ "enum.TicketMachineVisualLayers.Display1" ]
    - map: [ "enum.TicketMachineVisualLayers.Display2" ]
      offset: -0.15, 0
    - map: [ "enum.TicketMachineVisualLayers.Display3" ]
      offset: -0.3, 0