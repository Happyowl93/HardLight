- type: entity
  id: SlopDispenser
  parent: BaseLathe
  name: nutrient paste dispenser
  description: Produces tha slop using biomass. Can also convert plants to biomass for direct use.
  components:
    - type: Sprite
      sprite: Structures/Machines/biofabricator.rsi
      snapCardinals: true
      layers:
        - state: icon
          map: ["enum.LatheVisualLayers.IsRunning"]
          color: "#ffaa99"
        - state: unlit
          shader: unshaded
          map: ["enum.PowerDeviceVisualLayers.Powered"]
          color: "#ffaaaa"
        - state: inserting
          map: ["enum.MaterialStorageVisualLayers.Inserting"]
          color: "#ffaaaa"
        - state: panel
          map: ["enum.WiresVisualLayers.MaintenancePanel"]
    - type: Machine
      board: SlopDispenserMachineCircuitboard
    - type: MaterialStorage
      ignoreColor: true
      whitelist:
        tags:
          - Sheet
          - RawMaterial
    - type: Lathe
      idleState: icon
      runningState: building
      staticPacks:
        - SlopStatic
    - type: ProduceMaterialExtractor