- type: entity
  parent: BaseComputer
  id: nctterminal
  categories: [ShouldMapStation]
  name: NCT Dispatch
  description: Contact NCT Dispatch for assistance.
  placement:
      mode: SnapgridCenter
      snap:
          - Wallmount
  components:
      - type: WallMount
        arc: 360
      - type: Sprite
        sprite: _Starlight/Structures/Machines/nctterminal.rsi
        layers:
            - map: ["computerLayerBody"]
              state: base
            - map: ["computerLayerScreen"]
              state: screen
      - type: GenericVisualizer
        visuals:
            enum.ComputerVisuals.Powered:
                computerLayerScreen:
                    True: { visible: true, shader: unshaded }
                    False: { visible: false }
      - type: PointLight
        enabled: true
        radius: 1.5
        energy: 1.6
        color: "#57A3F7"
      - type: Rotatable
        rotateWhileAnchored: false
      - type: Anchorable
        flags:
            - Anchorable
