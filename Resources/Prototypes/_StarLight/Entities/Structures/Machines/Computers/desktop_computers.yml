# region: Base
- type: entity
  id: BaseDesktop
  abstract: true
  components:
  - type: Construction
    graph: DesktopComputer
    node: computer
    containers:
      - board
  - type: Sprite
    sprite: _Starlight/Structures/Machines/desktop_computers.rsi
    drawdepth: SmallObjects
    offset: 0,0.2
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.10,-0.10,0.10,0.10"
        density: 500
        mask:
        - TabletopMachineMask
        layer:
        - BulletImpassable
# endregion: Base

# region: Frame
- type: entity
  id: BaseStructureDesktopComputer
  parent: BaseStructure
  abstract: true
  components:
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.10,-0.10,0.10,0.10"
        density: 500
        mask:
        - TabletopMachineMask
        layer:
        - MachineLayer
  - type: InteractionOutline
  - type: Rotatable
  - type: Anchorable
  - type: Construction
    graph: DesktopComputer
    node: frameUnsecured
  - type: Sprite
    drawdepth: Objects
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Electronic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:ChangeConstructionNodeBehavior
        node: monitorBroken
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  id: DesktopComputerFrame
  parent: BaseStructureDesktopComputer
  name: desktop computer frame
  description: A desktop computer under construction.
  components:
  - type: Sprite
    sprite: _Starlight/Structures/Machines/desktop_frame.rsi
    drawdepth: SmallObjects
    offset: 0,0.2
    noRot: true
    layers:
    - state: 0
      map: [ "enum.ConstructionVisuals.Layer" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ConstructionVisuals.Key:
        enum.ConstructionVisuals.Layer:
          frameUnsecured: { state: 0 }
          boardUnsecured: { state: 1 }
          missingWires: { state: 2 }
          monitorMissing: { state: 3 }
          monitorUnsecured: { state: 4 }

- type: entity
  parent: BaseStructureDesktopComputer
  id: DesktopComputerBroken
  name: broken desktop computer
  description: Oh no! Cloopy is dead!
  components:
  - type: Construction
    graph: DesktopComputer
    node: monitorBroken
  - type: Sprite
    sprite: _Starlight/Structures/Machines/desktop_computers.rsi
    drawdepth: SmallObjects
    offset: 0,0.2
    noRot: true
    state: broken
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
# endregion: Frame

