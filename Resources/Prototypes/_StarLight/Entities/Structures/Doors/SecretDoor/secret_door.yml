- type: entity
  id: ReinforcedSecretDoorAssembly
  name: reinforced secret door assembly
  description: It opens, it closes, and maybe crushes you.
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _Starlight/Structures/Doors/reinforced_secret_door.rsi
    state: assembly
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 110
        mask:
        - FullTileMask
        layer:
        - HumanoidBlockLayer
  - type: Anchorable
    delay: 2
  - type: Pullable
  - type: Transform
    anchored: true
    noRot: false
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: RCDDeconstructable
    cost: 6
    delay: 8
    fx: EffectRCDDeconstruct8
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    graph: ReinforcedSecretDoor
    node: assembly
  placement:
    mode: SnapgridCenter

- type: entity
  id: ReinforcedSecretDoor
  name: reinforced wall
  parent: BaseSecretDoor
  components:
  - type: Construction
    graph: ReinforcedSecretDoor
    node: ReinforcedSecretDoor
    containers:
    - battery-container
  - type: Sprite
    sprite: _Starlight/Structures/Doors/reinforced_secret_door.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: IconSmooth
    key: walls
    mode: Corners
    base: reinf_over
    disabledStates:
    - "Opening"
    - "Closing" 
    - "Open"
