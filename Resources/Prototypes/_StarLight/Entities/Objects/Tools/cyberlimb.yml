# Mechwright
- type: entity
  name: wrench
  parent: Wrench
  id: WrenchCyber
  description: 'A common tool for assembly and disassembly. Remember: lefty latchy, righty removey.'
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Tools/cyberling.rsi
    state: wrench
  - type: MeleeWeapon
    wideAnimationRotation: 135
    attackRate: 1.5
    damage:
      types:
        Blunt: 6.5
    soundHit:
      collection: MetalThud
  - type: Tool
    speedModifier: 1.75
    qualities:
      - Anchoring
    useSound:
      path: /Audio/Items/ratchet.ogg
  - type: GuideHelp
    guides:
    - Construction
  - type: Tag
    tags:
      - CyberHandItem

- type: entity
  name: screwdriver
  parent: BaseItem
  id: ScrewdriverCyber
  description: Industrial grade torque in a small screwdriving package.
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/screwdriver_drop.ogg
  - type: Tag
    tags:
    - Screwdriver
    - CyberHandItem
  - type: Sprite
    sprite: _Starlight/Objects/Tools/cyberling.rsi
    layers:
    - state: screwdriver
      map: ["enum.DamageStateVisualLayers.Base"]
  - type: MeleeWeapon
    wideAnimationRotation: -90
    attackRate: 1
    damage:
      types:
        Piercing: 8
    soundHit:
      path: "/Audio/Weapons/bladeslice.ogg"
  - type: Tool
    speedModifier: 1.75
    qualities:
      - Screwing
    useSound:
      collection: Screwdriver
  - type: RandomSprite
    available:
      - enum.DamageStateVisualLayers.Base:
          screwdriver: Rainbow
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
  - type: StaticPrice
    price: 30

- type: entity
  name: crowbar
  parent: BaseItem
  id: CrowbarCyber
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/crowbar_drop.ogg
  - type: Tag
    tags:
    - Crowbar
    - CyberHandItem
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 10
    soundHit:
      collection: MetalThud
  - type: Tool
    speedModifier: 1.75
    qualities:
      - Prying
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: ToolTileCompatible
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
  - type: Prying
  - type: Sprite
    sprite: _Starlight/Objects/Tools/cyberling.rsi
    state: crowbar

- type: entity
  name: wirecutter
  parent: BaseItem
  id: WirecutterCyber
  description: This kills the wire.
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/wirecutter_drop.ogg
  - type: Tag
    tags:
    - PlantSampleTaker
    - Wirecutter
    - CyberHandItem
  - type: Sprite
    sprite: _Starlight/Objects/Tools/cyberling.rsi
    state: cutters
  - type: MeleeWeapon
    wideAnimationRotation: -90
    damage:
      types:
        Piercing: 2
    attackRate: 2 #open and close that shit on their arm like hell! because you sure aren't doing any damage with this
    soundHit:
      path: "/Audio/Items/wirecutter.ogg"
  - type: Tool
    speedModifier: 1.75
    qualities:
      - Cutting
    useSound:
      path: /Audio/Items/wirecutter.ogg
  - type: ToolTileCompatible
  - type: Scalpel
  - type: SurgeryTool
    successRate: 0.35
    startSound:
      path: /Audio/_Starlight/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_Starlight/Medical/Surgery/scalpel2.ogg

- type: entity
  name: welding tool
  parent: BaseItem
  id: WelderCyber
  description: "Melts anything as long as it's fueled, don't forget your eye protection!"
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/welder_drop.ogg
  - type: Sprite
    sprite: _Starlight/Objects/Tools/cyberling.rsi
    layers:
    - state: indwelder
    - state: indwelder-on
      visible: false
      shader: unshaded
      map: ["enum.ToggleableVisuals.Layer"]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: ItemToggle
    predictable: false
    soundActivate:
      collection: WelderOn
      params:
        variation: 0.125
        volume: -5
    soundDeactivate:
      collection: WelderOff
      params:
        variation: 0.125
        volume: -5
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
      params:
        variation: 0.250
        volume: -10
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
      params:
        variation: 0.250
        volume: -12
    deactivatedSoundOnHitNoDamage:
      collection: MetalThud
    activatedDamage:
        types:
            Heat: 8
  - type: ItemToggleSize
    activatedSize: Large
  - type: ItemToggleHot
  - type: ComponentToggler
    components:
    - type: DisarmMalus
      malus: 0.6
  - type: ToggleableLightVisuals
    spriteLayer: flame
    inhandVisuals:
      left:
      - state: inhand-left-flame
        shader: unshaded
      right:
      - state: inhand-right-flame
        shader: unshaded
  - type: UseDelay
  - type: MeleeWeapon
    wideAnimationRotation: -90
    damage:
      types:
        Blunt: 7 #i mean... i GUESS you could use it like that
    soundHit:
      collection: MetalThud
  - type: RefillableSolution
    solution: Welder
  - type: SolutionContainerManager
    solutions:
      Welder:
        reagents:
        - ReagentId: WeldingFuel
          Quantity: 100
        maxVol: 100
  - type: Tool
    speedModifier: 1.75
    useSound:
      collection: Welder
    qualities: Welding
  - type: Welder
  - type: PointLight
    enabled: false
    radius: 1.5
    color: orange
    netsync: false
  - type: ItemTogglePointLight
  - type: Appearance
  - type: RequiresEyeProtection
  - type: PhysicalComposition
    materialComposition:
      Steel: 200
  - type: StaticPrice
    price: 40
  - type: IgnitionSource
    temperature: 700
  - type: Tag
    tags:
      - CyberHandItem


# Spacer
- type: entity
  id: ProtokineticAcceleratorCyber
  name: cyber protokinetic accelerator
  description: Fires low-damage kinetic bolts at a short range. The lack of stabilisation leads to decreased accuracy when firing in short succession.
  parent: BaseItem
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Tools/cyberling.rsi
      state: protokineticaccelerator
    - type: Gun
      fireRate: 0.5
      selectedMode: SemiAuto
      angleDecay: 20
      minAngle: 1
      maxAngle: 60
      angleIncrease: 15
      availableModes:
      - SemiAuto
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/kinetic_accel.ogg
    - type: AmmoCounter
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.AmmoVisuals.HasAmmo:
          empty-icon:
            True: { visible: False }
            False: { visible: True }
          #todo: add other 'empty' animations
    - type: RechargeBasicEntityAmmo
      rechargeCooldown: 0.75
      rechargeSound:
        path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
    - type: BasicEntityAmmoProvider
      proto: BulletKinetic
      capacity: 1
      count: 1
    - type: Clothing
      sprite: Objects/Weapons/Guns/Basic/kinetic_accelerator.rsi
      quickEquip: false
      slots:
      - suitStorage
      - Belt
    - type: UseDelay
      delay: 1
    - type: UpgradeableGun
      whitelist:
        tags:
        - PKAUpgrade
    - type: ContainerContainer
      containers:
        upgrades: !type:Container
    - type: Tag
      tags:
        - CyberHandItem


- type: entity
  name: cyber grappling gun
  parent: BaseItem
  id: WeaponGrapplingGunCyber
  components:
    - type: AmmoCounter
    - type: GrapplingGun
    - type: Gun
      soundGunshot: /Audio/Weapons/Guns/Gunshots/harpoon.ogg
      fireRate: 0.5
      clumsyProof: true
    - type: BasicEntityAmmoProvider
      proto: GrapplingHook
      capacity: 1
    - type: Sprite
      sprite: _Starlight/Objects/Tools/cyberling.rsi
      layers:
        - state: grapplinghook
        - state: grapplinghook-loaded
          map: [ "unshaded" ]
          visible: true
    - type: UseDelay
      delay: 1.5
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.TetherVisualsStatus.Key:
          unshaded:
            True: { state: grapplinghook-loaded }
            False: { state: grapplinghook-unloaded }
    - type: PacifismAllowedGun
    - type: Tag
      tags:
        - CyberHandItem

- type: entity
  parent: [ BaseKnife, BaseWeaponCrusher]
  id: WeaponCrusherDaggerCyber
  name: cyber crusher dagger
  description: A scaled down version of a proto-kinetic crusher. Uses kinetic energy to vibrate the blade at high speeds.
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Tools/cyberling.rsi
      state: crusherdagger
    - type: MeleeWeapon
      autoAttack: true
      wideAnimationRotation: -135
      attackRate: 2
      damage:
        types:
          Slash: 12
    - type: DisarmMalus
      malus: 0.225
    - type: Tag
      tags:
        - CyberHandItem

# Gorilla
- type: entity
  name: G.O.R.I.L.L.A. gauntlet arm attachment
  parent: BaseItem
  id: WeaponGauntletGorillaCyber
  description: A robust piece of research equipment. When powered with an anomaly core, a single blow can launch anomalous objects through the air.
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Tools/cyberling.rsi
      state: gorillagauntlet
    - type: MeleeWeapon
      attackRate: 0.5
      angle: 0
      animation: WeaponArcFist
      wideAnimationRotation: -135
      damage:
        types:
          Blunt: 20
      soundHit:
        path: "/Audio/Weapons/Guns/Gunshots/kinetic_accel.ogg"
    - type: CorePoweredThrower
    - type: MeleeThrowOnHit
      unanchorOnHit: true
    - type: ItemSlots
      slots:
        core_slot:
          name: anomaly-gorilla-core-slot-name
          insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          whitelist:
            components:
            - AnomalyCore
    - type: ContainerContainer
      containers:
        core_slot: !type:ContainerSlot
    - type: DamageOnAttackedProtection
      damageProtection:
        flatReductions:
          Heat: 100
          Cold: 100
          Radiation: 100
      slots: NONE
    - type: Tag
      tags:
        - CyberHandItem

- type: entity
  name: C.H.I.M.P. handcannon arm attachment
  parent: BaseWeaponBatterySmall
  id: WeaponPistolCHIMPCyber
  description: Just because it's a little C.H.I.M.P. doesn't mean it can't punch like an A.P.E.
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Tools/cyberling.rsi
      layers:
        - state: chimphandcannon
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-unshaded-1
          visible: false
          map: ["enum.GunVisualLayers.MagUnshaded"]
          shader: unshaded
    - type: Appearance
    - type: MagazineVisuals
      magState: mag
      steps: 3
      zeroVisible: false
    - type: Gun
      projectileSpeed: 10
      fireRate: 1.5
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/taser2.ogg
    - type: ProjectileBatteryAmmoProvider
      proto: AnomalousParticleDeltaStrong
      fireCost: 100
    - type: BatteryWeaponFireModes
      fireModes:
      - proto: AnomalousParticleDeltaStrong
        fireCost: 100
      - proto: AnomalousParticleEpsilonStrong
        fireCost: 100
      - proto: AnomalousParticleZetaStrong
        fireCost: 100
      - proto: AnomalousParticleSigmaStrong
        fireCost: 100
    - type: StaticPrice
      price: 0
    - type: BatterySelfRecharger
      autoRecharge: true
      autoRechargeRate: 2 # takes 6 minutes to charge itself back to full
    - type: Tag
      tags:
        - CyberHandItem

- type: entity
  parent: BaseItem
  id: AnomalyScannerCyber
  name: anomaly scanner arm attachment
  description: An arm-mounted scanner built to collect information on various anomalous objects.
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Tools/cyberling.rsi
      state: anomalyscanner
    - type: ActivatableUI
      key: enum.AnomalyScannerUiKey.Key
      requireActiveHand: false
      inHandsOnly: true
    - type: UserInterface
      interfaces:
        enum.AnomalyScannerUiKey.Key:
          type: AnomalyScannerBoundUserInterface
    - type: AnomalyScanner
    - type: GuideHelp
      guides:
      - ScannersAndVessel
    - type: Tag
      tags:
        - CyberHandItem
