# Starlight - Dravon 75mm & AK570 90mm Projectiles

# --- DRAVON 75mm HE ---
- type: entity
  id: BulletDravon75mmHE
  name: DVN-75 75mm HE shell
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: grenade
    scale: 1.2, 1.2
  - type: Projectile
    damage:
      types:
        Piercing: 60
        Structural: 80
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 180      # medium-light blast, ~4 tile radius
    intensitySlope: 6
    maxIntensity: 20
    canCreateVacuum: true
  - type: PointLight
    enabled: true
    radius: 2.5
    energy: 1.5
    color: "#ff6600"
  - type: RadarBlip
    color: "#FFB300"
    scale: 0.9
    shape: Square
    requireInSpace: true
  - type: PDTarget

# --- AK570 90mm HE ---
- type: entity
  id: BulletAK570_90mmHE
  name: AK-90 90mm HE shell
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: grenade
    scale: 1.35, 1.35
  - type: Projectile
    damage:
      types:
        Piercing: 90
        Structural: 120
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 260      # medium blast, ~4-5 tile radius
    intensitySlope: 7
    maxIntensity: 24
    canCreateVacuum: true
  - type: PointLight
    enabled: true
    radius: 3
    energy: 2
    color: "#ff8800"
  - type: RadarBlip
    color: "#FF9900"
    scale: 1.0
    shape: Square
    requireInSpace: true
  - type: PDTarget

# --- LEVIATHAN 240mm HE (single-shot, devastating) ---
- type: entity
  id: BulletLeviathan240mmHE
  name: LVT-240 240mm HE shell
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: grenade
    scale: 3.0, 3.0
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 900      # massive blast, ~8-9 tile radius
    intensitySlope: 5
    maxIntensity: 50
    canCreateVacuum: true
  - type: PointLight
    enabled: true
    radius: 6
    energy: 5
    color: "#ff4400"
  - type: RadarBlip
    color: "#FF2200"
    scale: 2.0
    shape: Triangle
    requireInSpace: true
  - type: PDTarget
