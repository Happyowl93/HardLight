# Pita
- type: entity
  parent: FoodBreadBase
  id: FoodBreadPita
  name: pita
  description: A flatbread with internal pocket. Best when eaten stuffed.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/pita.rsi
    layers:
    - state: pita
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 8
        reagents:
        - ReagentId: Nutriment
          Quantity: 2

# Falafel
- type: entity
  parent: FoodInjectableBase
  id: FoodFalafel
  name: falafel
  description: A hearty pea-based mince. The vegan meatloaf of the Middle East.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/falafel.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 14
        reagents:
        - ReagentId: Nutriment
          Quantity: 7
        - ReagentId: Hummus
          Quantity: 5

# Hummus
- type: entity
  parent: FoodInjectableBase
  id: FoodHummusDip
  name: hummus
  description: A hearty pea-based paste. The ultimate dip of the Middle East.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/hummus.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 9
        reagents:
        - ReagentId: Hummus
          Quantity: 7

