# Middle Eastern Foods

# Raw Pita
- type: entity
  parent: FoodBakingBase
  id: FoodDoughPita
  name: pita dough
  description: A piece of pita dough.
  components:
  - type: Item
    size: Normal
  - type: FlavorProfile
    flavors:
      - chalky
      - dough
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/pita.rsi
    layers:
    - state: pitadough
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 3
        reagents:
        - ReagentId: Nutriment
          Quantity: 2
