# Turkish Delight
- type: entity
  parent: FoodInjectableBase
  id: FoodSnackTurkishDelight
  name: uncut turkish delight
  description: A massive, wobbling gelatin dessert. Contains nuts!
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/turkishdelight.rsi
    layers:
    - state: uncut
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 48
        reagents:
        - ReagentId: Sugar
          Quantity: 35
        - ReagentId: Nutriment
          Quantity: 5
  - type: SliceableFood
    count: 8
    slice: FoodSnackTurkishDelightCube
  - type: Item
    size: Normal
    shape:
    - 0,0,2,1

- type: entity
  parent: FoodInjectableBase
  id: FoodSnackTurkishDelightCube
  name: turkish delight
  description: A tiny, wobbling gelatin dessert. Contains nuts!
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Consumable/Food/turkishdelight.rsi
    layers:
    - state: cube
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 6
        reagents:
        - ReagentId: Sugar
          Quantity: 4.375
        - ReagentId: Nutriment
          Quantity: 0.625
  - type: Item
    size: Tiny
