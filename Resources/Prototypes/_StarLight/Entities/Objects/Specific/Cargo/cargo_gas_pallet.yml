- type: entity
  parent: GasUnaryBase
  id: CargoGasPallet
  name: cargo gas sale tank
  description: Stores gasses pumped through piping for sale. Made of plastitanium to discourage pesky vandals.
  components:
  - type: Anchorable
    flags:
    - Anchorable
  - type: SubFloorHide
    visibleLayers:
    - enum.SubfloorLayers.FirstLayer
  - type: CargoGasPallet
  - type: Sprite
    drawdepth: FloorObjects
    sprite: Structures/Piping/Atmospherics/gascanisterport.rsi
    layers:
      - sprite: Structures/Piping/Atmospherics/pipe.rsi
        state: pipeUnaryConnectors
        map: [ "enum.PipeVisualLayers.Pipe" ]
      - state: gasCanisterPort
        map: [ "enum.SubfloorLayers.FirstLayer" ]
  - type: AtmosPipeLayers
    spriteRsiPaths: {}
  - type: Appearance
  - type: PipeColorVisuals
  - type: AtmosMonitoringConsoleDevice
    navMapBlip: GasVentOpening
