- type: entity
  parent: BaseItem
  id: BaseSlimeExtract
  abstract: true
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Starlight/Objects/Specific/Xenobiology/test_slime_extract.rsi
    layers:
      - state: test_slime_extract
  - type: SolutionContainerManager
    solutions:
      container:
        maxVol: 15
  - type: DrawableSolution
    solution: container
  - type: InjectableSolution
    solution: container
  - type: SolutionItemStatus
    solution: container
  - type: SlimeExtract
    containerName: container

- type: entity
  parent: BaseSlimeExtract
  id: GraySlimeExtract
  name: Gray Slime Extract
  components:
  - type: Sprite
    color: "#999999FF"
  - type: SlimeExtract
    extractReactions:
    - requirements:
        reagents:
        - ReagentId: Water
          Quantity: 1
      effects:
        - effect: !type:SpawnEntity
            entity: MonkeyCube
            number: 3
          scalingFactor: 0
          scalingOffset: 1