# Luminous Orb

- type: entity
  name: Luminous Orb
  parent: BaseItem
  id: LuminousOrb
  description: Destined to burn out and fade away.
  components:
  - type: Sprite
    sprite: Objects/Fun/pondering_orb.rsi
    state: icon
  - type: Item
    sprite: Objects/Fun/pondering_orb.rsi
    size: Tiny
  - type: PointLight
    radius: 4
    color: "#00CCFF"
  - type: TimedDespawn
    lifetime: 25
  - type: TileFrictionModifier
    modifier: 0.001
  - type: EmitSoundOnSpawn
    sound: 
      path: /Audio/Effects/Lightning/eye_open.ogg
