- type: entity
  categories: [ HideSpawnMenu, Spawner ]
  parent: BaseAntagSpawner
  id: SpawnPointGhostDerelictBorgi
  components:
  - type: GhostRole
    name: ghost-role-information-derelict-borgi-name
    description: ghost-role-information-derelict-borgi-desc
    rules: ghost-role-information-silicon-rules
    raffle:
      settings: default
    requirements:
    - !type:OverallPlaytimeRequirement
      time: 86400 # 24h STARLIGHT
    - !type:RoleTimeRequirement
      role: JobBorg
      time: 21600 # 6h STARLIGHT
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Mobs/Silicon/Chassis/derelict.rsi
      state: derelict_icon

- type: entity
