#reaper
- type: entity
  id: LeftArmCyberReaper
  name: "left reaper arm"
  parent: [PartCyber, BaseLeftArm]
  components:
    - type: BaseLayerId
      layers:
        Default: CyberLArmSilver
        Resomi: ResomiCyberLArmSilver
    - type: BaseLayerIdToggled
      layers: 
        Default: CyberLArmSilverReaper
        Resomi: ResomiCyberLArmSilverReaper
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_silver_arm"
    - type: Icon
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_silver_arm"
    - type: LimbItemStorage
      items:
        - ScalpelCyber
        - RetractorCyber
        - CauteryCyber
        - DrillCyber
        - SawCyber
        - HemostatCyber
        - BoneSetterCyber
        - BoneGel
    - type: LimbItemDeployer
      action: ActionToggleCyberHandLeft
      sound: 
        path: /Audio/_Starlight/Medical/Cyber/deploy.ogg
      handWhitelist:
        tags:
          - CyberHandItem
          - BoneGel
    - type: WithAttachedBodyParts
      parts:
        left hand: LeftHandCyber

- type: entity
  id: RightArmCyberReaper
  name: "right reaper arm"
  parent: [PartCyber, BaseRightArm]
  components:
    - type: BaseLayerId
