- type: entity
  abstract: true
  parent: BaseObjective
  id: BasePirateObjective
  components:
  - type: Objective
    difficulty: 1
    issuer: objective-issuer-pirate
  - type: RoleRequirement
    roles:
    - PirateRole

- type: entity
  parent: BasePirateObjective
  id: PirateSurviveObjective
  name: Survive the raid
  description: You are a pirate. Stay alive and make it back to the ship when the raid is over.
  components:
  - type: Objective
    unique: true
    icon:
      sprite: Clothing/Head/Hats/pirate.rsi
      state: icon
  - type: SurviveCondition

- type: entity
  parent: BasePirateObjective
  id: PirateFollowCaptainObjective
  name: Follow your captain's orders
  description: You are a crew member of the pirate vessel. Obey your captain at all times and support the crew in their endeavours. Plunder what you can and make it back to the ship.
  components:
  - type: Objective
    unique: true
    icon:
      sprite: _Starlight/Interface/Misc/rp_icon.rsi
      state: icon
  - type: KeepAliveCondition
