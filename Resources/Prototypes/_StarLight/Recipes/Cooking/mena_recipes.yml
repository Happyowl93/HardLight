    OilOlive:
      amount: 1
    Flour:
      amount: 5
    Water:
      amount: 5
  effects:
    - !type:CreateEntityReactionEffect
      entity: FoodPitaDough
      
- type: microwaveMealRecipe
  id: RecipePita
  name: pita recipe
