- type: constructionGraph
  id: GasTrinaryStarlight
  start: start
  graph:
    - node: start
      edges:
        # filter

    - to: filterAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
  
    - to: filterAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: filterflippedAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
  
    - to: filterflippedAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
        
      # Inline Filter
      - to: inline_filter
        steps:
          - material: Steel
            amount: 2
            doAfter: 1

    # filter
    - node: filterAlt1
      entity: GasFilterAlt1
      edges:
      - to: start
        conditions:
        - !type:EntityAnchored
          anchored: false
        completed:
        - !type:SpawnPrototype
          prototype: SheetSteel1
          amount: 2
        - !type:DeleteEntity
        steps:
        - tool: Welding
          doAfter: 1
      
    - node: filterAlt2
      entity: GasFilterAlt2
      edges:
      - to: start
        conditions:
        - !type:EntityAnchored
          anchored: false
        completed:
        - !type:SpawnPrototype
          prototype: SheetSteel1
          amount: 2
        - !type:DeleteEntity
        steps:
        - tool: Welding
          doAfter: 1

    - node: filterflippedAlt1
      entity: GasFilterFlippedAlt1
      edges:
      - to: start
        conditions:
        - !type:EntityAnchored
          anchored: false
        completed:
        - !type:SpawnPrototype
          prototype: SheetSteel1
          amount: 2
        - !type:DeleteEntity
        steps:
        - tool: Welding
          doAfter: 1
      
    - node: filterflippedAlt2
      entity: GasFilterFlippedAlt2
      edges:
      - to: start
        conditions:
        - !type:EntityAnchored
          anchored: false
        completed:
        - !type:SpawnPrototype
          prototype: SheetSteel1
          amount: 2
        - !type:DeleteEntity
        steps:
        - tool: Welding
          doAfter: 1

    # Inline Filter
    - node: inline_filter
      entity: GasFilterInline
      edges:
        - to: start
          conditions:
            - !type:EntityAnchored
              anchored: false
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 2
            - !type:DeleteEntity
          steps:
            - tool: Welding
              doAfter: 1
