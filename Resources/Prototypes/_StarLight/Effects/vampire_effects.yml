- type: entity
  id: VampireBloodTendrilVisual
  name: blood tendrils
  noSpawn: true
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_Starlight/Vampire/effects.rsi
      state: blood_tendril_ent
      drawdepth: Effects
    - type: TimedDespawn
      lifetime: 1.05
    - type: Clickable
    - type: Physics
      canCollide: false
    - type: Transform
      noRot: true

# Shadow Boxing shadow punch visual
- type: entity
  id: VampireShadowBoxingPunch
  name: shadow punch
  noSpawn: true
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_Starlight/Vampire/effects.rsi
      state: shadow_box_atack_effect
      drawdepth: Effects
      directionOffset: 0
    - type: TimedDespawn
      lifetime: 0.4
    - type: Physics
      canCollide: false
    - type: Transform
      noRot: false

- type: entity
  id: VampireBloodBarrier
  name: blood barrier
  description: A barrier made of solidified blood that blocks movement.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_Starlight/Vampire/effects.rsi
      state: blood_barrier_ent
      drawdepth: Walls
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          mask:
            - Impassable
          layer:
            - Impassable
    - type: Damageable
      damageContainer: Inorganic
    - type: Destructible
      thresholds:
        - trigger: !type:DamageTrigger
            damage: 130
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]

- type: entity
  id: VampireSanguinePoolOut
  name: vampire transformation out
  noSpawn: true
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_Starlight/Vampire/effects.rsi
      state: vampout
      drawdepth: Effects
    - type: TimedDespawn
      lifetime: 1.2
    - type: Clickable
    - type: Physics
      canCollide: false
    - type: Transform
      noRot: true

- type: entity
  id: VampireSanguinePoolIn
  name: vampire transformation in
  noSpawn: true
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_Starlight/Vampire/effects.rsi
      state: vampin
      drawdepth: Effects
    - type: TimedDespawn
      lifetime: 1.2
    - type: Physics
      canCollide: false
    - type: Transform
      noRot: true
    - type: Tag
      tags:
        - Wall
        - VampireBarrier

