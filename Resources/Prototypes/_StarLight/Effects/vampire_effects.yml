- type: entity
  id: VampireShadowAnchorBeacon
  name: shadow anchor
  description: A pulsing knot of shadow you can return to.
  noSpawn: true
  categories: [HideSpawnMenu]
  components:
    - type: Transform
      anchored: true
    - type: Sprite
      sprite: /Textures/_Starlight/Vampire/effects.rsi
      state: pylon
      drawdepth: Effects
    - type: TimedDespawn
      lifetime: 120
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeAabb
            bounds: "-0.3,-0.3,0.3,0.3"
          hard: false
    - type: Clickable
    - type: InteractionOutline
      enabled: false
    - type: Stealth
      visibility: -0.8

- type: entity
  id: VampireEternalDarknessAura
  name: vampiric darkness aura
  noSpawn: true
  components:
    - type: Transform
      anchored: false
    - type: PointLight
      enabled: true
      radius: 6.0  
      energy: 1.0         
      softness: 4.0        
      color: "#6d00ff"     
      castShadows: false
      autoBrightness: false
    - type: Sprite
      sprite: Effects/blank.rsi
      state: blank
      draws: false
    - type: MetaData
      entityClass: Effect
    - type: Tag
      tags:
        - HideContextMenu
