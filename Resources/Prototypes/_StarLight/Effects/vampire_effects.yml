- type: entity
  id: VampireDrainBeam
  name: drain beam
  description: A crimson beam of life-draining energy.
  noSpawn: true
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_Starlight/Vampire/effects.rsi
      layers:
        - state: drainbeam
          map: ["enum.EffectLayers.Unshaded"]
      drawdepth: Effects
    - type: AnimationPlayer
    - type: Clickable
    - type: Physics
      canCollide: false
    - type: Transform
      noRot: false

- type: entity
  id: VampireDrainBeamVisual
  name: drain beam visual
  description: A smooth client-side vampire drain beam.
  noSpawn: true
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: /Textures/_Starlight/Vampire/effects.rsi
      layers:
        - state: drainbeam
          map: ["enum.EffectLayers.Unshaded"]
          offset: 0, 0
      drawdepth: BelowMobs
    - type: Transform
      noRot: false

- type: entity
  id: VampireShadowSnareTrap
  name: shadow snare
  description: A nearly invisible snare of condensed darkness.
  noSpawn: true
  components:
    - type: Transform
      anchored: true
    - type: Sprite
      sprite: _Starlight/Vampire/effects.rsi
      state: shadow_snare_base
      drawdepth: Items
      noRot: true
    - type: Clickable
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        slips:
          shape: !type:PhysShapeAabb
            bounds: "-0.25,-0.25,0.25,0.25"
          hard: false
          layer:
            - LowImpassable
    - type: InteractionOutline
      enabled: false

