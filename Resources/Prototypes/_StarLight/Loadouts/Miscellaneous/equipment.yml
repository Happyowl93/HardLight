## Any kind of equipment that doesn't fit elsewhere, goes in this file.

- type: loadout
  id: SecGloves
  equipment:
    gloves: ClothingHandsGlovesSecurityRed

- type: loadout
  id: SecGlovesFingerless
  equipment:
    gloves: ClothingHandsGlovesSecurityFingerlessRed

- type: loadout
  id: CoderSocks
  effects:
    - !type:JobRequirementLoadoutEffect
      requirement:
        !type:DepartmentTimeRequirement
        department: Command
        time: 36000 # 10 hours of meowing
  equipment:
    shoes: ClothingUnderSocksCoder
  groupBy: "maid outfit"

- type: loadout
  id: ClothWrap
  storage:
    back:
    - ClothingClothWrap

- type: loadout
  id: MaidOutfit
  effects:
    - !type:JobRequirementLoadoutEffect
      requirement:
        !type:DepartmentTimeRequirement
        department: Civilian
        time: 72000 # 20 hours
  equipment:
    jumpsuit: ClothingUniformJumpskirtElegantMaid
  groupBy: "maid outfit"

