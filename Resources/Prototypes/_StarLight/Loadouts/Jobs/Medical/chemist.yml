# Skilled (Beaker) Time
- type: loadoutEffectGroup
  id: SkilledChemist
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobChemist
      time: 54000 # 15 hrs

# Senior Time
- type: loadoutEffectGroup
  id: SeniorChemist
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobChemist
      time: 216000 # 60 hrs


# PDA
- type: loadout
  id: ChemistPDA
  equipment:
    id: ChemistryPDA

- type: loadout
  id: SeniorChemistPDA
  effects:
    - !type:GroupLoadoutEffect
    proto: SeniorChemist
  equipment:
    id: SeniorChemistPDA


# Beaker
- type: loadout
  id: LightBeaker
  storage:
    back:
    - LightBeaker
    
- type: loadout
  id: SilverBeaker
  effects:
    - !type:GroupLoadoutEffect
    proto: SkilledChemist
  storage:
    back:
    - SilverBeaker
