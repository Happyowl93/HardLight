# Skilled Time
- type: loadoutEffectGroup
  id: SkilledClown
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobClown
      time: 54000 # 15 hrs

# Jumpsuits
- type: loadout
  id: ClownFormalJumpsuit
  effects:
  - !type:GroupLoadoutEffect
    proto: SkilledClown
  equipment:
    jumpsuit: ClothingUniformJumpsuitClownFormal

- type: loadout
  id: ClownFormalJumpskirt
  effects:
  - !type:GroupLoadoutEffect
    proto: SkilledClown
  equipment:
    jumpsuit: ClothingUniformJumpskirtClownFormal