# Luminous Orb

- type: entity
  parent: BaseAction
  id: ActionCantripGlow
  name: Luminous Orb
  description: Creates a short-lived luminous ball of light.
  components:
  - type: Magic
    requiresClothes: false
  - type: Action
    useDelay: 45
    itemIconStyle: BigAction
    icon:
      sprite: Objects/Fun/pondering_orb.rsi
      state: icon
  - type: InstantAction
    event: !type:SpawnItemInHandEvent
      spawned: LuminousOrb

