# Partially copied from medibot.yml
# If it works, it works
- type: htnCompound
  id: SlimeEatCompound
  branches:
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:RandomOperator
          targetKey: IdleTime
          minKey: MinimumIdleTime
          maxKey: MaximumIdleTime
        preconditions:
          - !type:NotHungryPrecondition
            minHungerState: Okay

      - !type:HTNPrimitiveTask
        operator: !type:WaitOperator
          key: IdleTime
        preconditions:
          - !type:KeyExistsPrecondition
            key: IdleTime

      - !type:HTNPrimitiveTask
        operator: !type:SlimeSplitOperator
          splitAmount: 4
    
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:SlimeTargetKnownEdibleTargetOperator
          targetKey: EatTarget
          targetMoveKey: TargetCoordinates
        preconditions:
          - !type:HungryPrecondition
            minHungerState: Okay

      - !type:HTNPrimitiveTask
        operator: !type:SetFloatOperator
          targetKey: MovementRange
          amount: 0.5

      - !type:HTNPrimitiveTask
        operator: !type:MoveToOperator
          pathfindInPlanning: false

      - !type:HTNPrimitiveTask
        operator: !type:SlimeEatOperator
          targetKey: EatTarget

      - !type:HTNPrimitiveTask
        operator: !type:SetFloatOperator
          targetKey: IdleTime
          amount: 1

      - !type:HTNPrimitiveTask
        operator: !type:WaitOperator
          key: IdleTime
        preconditions:
          - !type:KeyExistsPrecondition
            key: IdleTime
    
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:SlimeFindEdibleTargetOperator
    
    - tasks:
      - !type:HTNCompoundTask
        task: IdleCompound