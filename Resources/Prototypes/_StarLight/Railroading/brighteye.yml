- type: entity
  id: BrighteyeCondition
  categories: [HideSpawnMenu]
  abstract: true
  components:
    - type: Conditions
      conditions:
        - !type:SubjectMindAntagCondition
          whitelist:
            - Brighteye

- type: entity
  id: RRCardBrighteyeDark
  parent: BrighteyeCondition
  categories: [HideSpawnMenu]
  components:
    - type: RailroadSpawnFlow
      count:
        min: 2
        max: 3
    - type: RailroadCard
      title: rr-brighteye-dark
      icon: 
      iconColor: "#000000"
      color: "#6c15ae"
      image: /Textures/_Starlight/Railroading/shadekin.png
      description: rr-brighteye-dark-desc
    - type: RailroadDarkTask
      amount:
        min: 100
        max: 300

- type: entity
  id: RRCardBrighteyePortalCritical
  parent: BrighteyeCondition
  categories: [HideSpawnMenu]
  components:
    - type: RailroadSpawnFlow
      count:
        min: 1
        max: 2
    - type: RailroadCard
      title: rr-brighteye-portal-crit
      icon: 
      iconColor: "#000000"
      color: "#6c15ae"
      image: /Textures/_Starlight/Railroading/shadekin.png
      description: rr-brighteye-portal-crit-desc
    - type: RailroadSupercritPortalTask

- type: entity
  id: RRCardBrighteyeTeachALesson
  parent: BrighteyeCondition
  categories: [HideSpawnMenu]
  components:
    - type: RailroadSpawnFlow
      count:
        min: 1
        max: 2
    - type: RailroadCard
      title: rr-brighteye-teachalesson
      icon: 
      iconColor: "#fd3f3f"
      color: "#6c15ae"
      image: /Textures/_Starlight/Railroading/shadekin.png
      description: rr-brighteye-teachalesson-desc
    - type: TargetObjective
      title: objective-condition-teach-lesson-title
      icon:
        sprite: /Textures/Objects/Weapons/Melee/spear.rsi
        state: spear
    - type: PickRandomPerson
      filters:
        - !type:BodyMindFilter
          whitelist:
            components:
              - Shadekin
          inverted: true
        - !type:TargetObjectiveMindFilter
          blacklist:
            components:
              - TeachALessonTarget
    - type: TeachALessonCondition

- type: entity
  id: RRCardBrighteyeProtect
  parent: BrighteyeCondition
  categories: [HideSpawnMenu]
  components:
    - type: RailroadSpawnFlow
      count:
        min: 1
        max: 2
    - type: RailroadCard
      title: rr-brighteye-protect
      icon: 
      color: "#9FED5896"
      image: /Textures/_Starlight/Railroading/shadekin.png
      description: rr-brighteye-protect-desc
    - type: TargetObjective
      title: objective-condition-shadekin-alive-title
      icon:
        sprite: /Textures/Interface/Actions/actions_fakemindshield.rsi
        state: icon-on
    - type: PickRandomPerson
      filters:
        - !type:BodyMindFilter
          whitelist:
            components:
              - Shadekin
        - !type:BodyMindFilter
          whitelist:
            components:
              - Brighteye
          inverted: true
        - !type:TargetObjectiveMindFilter
          blacklist:
            components:
              - KeepAliveCondition
    - type: KeepAliveCondition
