# Haemomancer abilities

- type: entity
  parent: BaseAction
  id: ActionVampireHemomancerClaws
  name: Vampiric Claws
  description: Create undroppable claws of blood. Each hit grants +5 blood. Has 15 swings. Use in hand to dispel.
  components:
    - type: Action
      useDelay: 30
      itemIconStyle: NoItem
      priority: 10
      icon:
        sprite: _Starlight/Vampire/Haemomancer.rsi
        state: claws
    - type: InstantAction
      event: !type:VampireHemomancerClawsActionEvent {}
    - type: VampireAction
      bloodToUnlock: 150
      bloodCost: 30
      requiredClass: Hemomancer

- type: entity
  parent: BaseAction
  id: ActionVampireSanguinePool
  name: Sanguine Pool
  description: Transform into a pool of blood for 8 seconds, allowing movement through doors and windows.
  components:
    - type: Action
      useDelay: 25
      itemIconStyle: NoItem
      priority: 13
      icon:
        sprite: _Starlight/Vampire/Haemomancer.rsi
        state: blood_pool
    - type: InstantAction
      event: !type:VampireSanguinePoolActionEvent {}
    - type: VampireAction
      bloodToUnlock: 400
      bloodCost: 30
      requiredClass: Hemomancer

- type: entity
  parent: BaseAction
  id: ActionVampireHemomancerTendrils
  name: Blood Tendrils
  description: After a short delay, tendrils erupt in a 3x3 area, poisoning and heavily slowing victims.
  components:
    - type: Action
      useDelay: 10
      itemIconStyle: NoItem
      priority: 11
      icon:
        sprite: _Starlight/Vampire/Haemomancer.rsi
        state: blood_tendrils
    - type: TargetAction
      checkCanAccess: false
      range: 7
    - type: WorldTargetAction
      range: 7
      event: !type:VampireHemomancerTendrilsActionEvent
        delay: 1.0
        slowMultiplier: 0.3
        slowDuration: 2.0
        toxinDamage: 33
        spawnVisuals: true
    - type: VampireAction
      bloodToUnlock: 250
      bloodCost: 25
      requiredClass: Hemomancer

- type: entity
  parent: BaseAction
  id: ActionVampireBloodBarrier
  name: Blood Barrier
  description: Creates 3 blood barriers at the target location. Vampires can pass through them.
  components:
    - type: Action
      useDelay: 15
      itemIconStyle: NoItem
      priority: 12
      icon:
        sprite: _Starlight/Vampire/Haemomancer.rsi
        state: blood_barrier
    - type: TargetAction
      checkCanAccess: false
      range: 6
    - type: WorldTargetAction
      range: 6
      event: !type:VampireBloodBarrierActionEvent
        barrierCount: 3
    - type: VampireAction
      bloodToUnlock: 250
      bloodCost: 40
      requiredClass: Hemomancer

