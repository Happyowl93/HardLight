- type: entity
  parent: BaseGameRule
  id: PsychicScreach
  components:
  - type: StationEvent
    weight: 1
    endAnnouncement: station-event-psychicscreach-announcement
    endAudio:
      path: /Audio/_Starlight/Announcements/announce_broken.ogg
    duration: 20
    maxDuration: 30
    maxOccurrences: 1
  - type: PsychicScreachRule
  - type: SolarFlareRule
    affectedChannels:
    - Common
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
    - Law

- type: entity
  parent: BaseGameRule
  id: SecurityDrill
  components:
  - type: StationEvent
    globalAnnouncement: false
    weight: 6
    startAudio:
      path: /Audio/Announcements/announce.ogg
  - type: SecurityDrillRule

- type: entity
  parent: BaseGameRule
  id: DoorRuntime
  components:
  - type: StationEvent
    weight: 2
    startAnnouncementColor: Red
    startAnnouncement: station-event-doorrunetime-start-announcement
    startAudio:
      path: /Audio/Misc/notice1.ogg
    endAnnouncement: station-event-doorrunetime-end-announcement
    endAudio:
      path: /Audio/Announcements/announce.ogg
    duration: 90
    reoccurrenceDelay: 20
    maxOccurrences: 2
  - type: DoorRunetimeRule

- type: entity
  parent: BaseGameRule
  id: RadStorm
  components:
  - type: StationEvent
    weight: 2
    startAnnouncementColor: Red
    startAnnouncement: station-event-radstorm-start-announcement
    startAudio:
      path: /Audio/Misc/notice1.ogg
    endAnnouncement: station-event-radstorm-end-announcement
    endAudio:
      path: /Audio/Announcements/announce.ogg
    duration: 115
    maxOccurrences: 1
  - type: WeatherRule
    weather: RadStorm
    duration: 100
    delay: 10