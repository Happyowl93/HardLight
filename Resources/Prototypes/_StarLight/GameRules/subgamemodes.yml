- type: entity
  parent: BaseGameRule
  id: SiliconLiberation
  components:
  - type: SELFRule
  - type: AntagObjectives
    objectives:
    - SiliconRightsObjective
    - FreeAIObjective
    - FreeBorgsObjective
  - type: AntagSelection
    agentName: self-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ SELFAgent ]
      max: 3
      startingGear: SELFAgentGear
      mindRoles:
      - MindRoleSELFAgent
      briefing:
        sound: "/Audio/_Starlight/Misc/self_greeting.ogg"
  - type: DynamicRuleCost
    cost: 70

# Variant of thieves that only spawn up to 3. Used in revs to prevent emags from being too easily obtained.
- type: entity
  parent: Thief
  id: ThiefLess
  components:
  - type: ThiefRule
  - type: AntagObjectives
    objectives:
    - EscapeThiefShuttleObjective
  - type: AntagRandomObjectives
    sets:
    - groups: ThiefBigObjectiveGroups
      prob: 0.7
      maxPicks: 1
    - groups: ThiefObjectiveGroups
      maxPicks: 10
    maxDifficulty: 2.5
  - type: AntagSelection
    agentName: thief-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Thief ]
      max: 3 # Starlight. Prevents excess thieves from spawning on Revs.
      playerRatio: 21 # Starlight. Accounts for the thieves in the population. (63 pop = 60 crew 3 thieves.)
      lateJoinAdditional: true
      allowNonHumans: true
      multiAntagSetting: NotExclusive
      startingGear: ThiefGear
      components:
      - type: Pacified
      - type: Thieving
        stripTimeReduction: 2
        stealthy: true
      mindRoles:
      - MindRoleThief
      briefing:
        sound: "/Audio/Misc/thief_greeting.ogg"
  - type: DynamicRuleCost
    cost: 75

- type: entity
  parent: Vampire
  id: VampireLess
  components:
  - type: VampireRule
  - type: AntagSelection
    agentName: vampire-roundend-name
    definitions:
    - prefRoles: [ Vampire ]
      max: 5 # Starlight. Accounting for scaling. Not as many as the full gamemode.
      playerRatio: 15 # Starlight. Accounting for scaling.
      lateJoinAdditional: true
      allowNonHumans: True
      multiAntagSetting: None
      mindRoles:
      - MindRoleVampire
