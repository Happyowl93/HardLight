- type: entity
  parent: Jump
  id: JumpJetNoMoles # for cyborg jetpacks
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 15
    itemIconStyle: BigAction
    icon:
      sprite: _Starlight/Actions/resomi.rsi
      state: jump
  - type: WorldTargetAction
    event: !type:JumpActionEvent
      distance: 10
      fromGrid: false
      toPointer: false
      sound:
        path: /Audio/_Starlight/Effects/Jump/jetpack.ogg