    LHand: MobLagomorphLHand
    RHand: MobLagomorphRHand
    LLeg: MobLagomorphLLeg
    RLeg: MobLagomorphRLeg
    LFoot: MobLagomorphLFoot
    RFoot: MobLagomorphRFoot

- type: markingPoints
  id: MobLagomorphMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ LagomorphTailFluffy ]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ LagomorphEarsTall ]
    HeadSide:
      points: 2
      required: false
    Head:
      points: 1
      required: false
    Special:
      points: 2
      required: false
    Arms:
      points: 1
      required: false
    Legs:
      points: 1
      required: false

