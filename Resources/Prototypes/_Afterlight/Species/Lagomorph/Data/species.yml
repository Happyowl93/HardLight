- type: species
  id: Lagomorph
  name: species-name-lagomorph
  roundStart: true
  prototype: MobLagomorph
  sprites: MobLagomorphSprites
  markingLimits: MobLagomorphMarkingLimits
  dollPrototype: MobLagomorphDummy
  skinColoration: Hues
  customName: true
  maxHeight: 2
  minWidth: 0.725

- type: speciesBaseSprites
  id: MobLagomorphSprites
  sprites:
    Tail: MobHumanoidAnyMarking
    Special: MobHumanoidAnyMarking
    Head: MobLagomorphHead
    HeadSide: MobHumanoidAnyMarking
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Chest: MobLagomorphTorso
    Eyes: MobHumanoidEyes
    HeadTop: MobHumanoidAnyMarking
