- type: body
  id: Lagomorph
  name: "Lagomorph"
  root: torso
  slots:
    head:
      part: HeadLagomorph
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
        tongue: OrganHumanTongue
        eye_implant: null
    torso:
      part: TorsoLagomorph
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
      organs:
        heart: OrganHumanHeart
        lungs: OrganHumanLungs
        stomach: OrganLagomorphStomach
        liver: OrganHumanLiver
        kidneys: OrganHumanKidneys
        cavity: null
    right arm:
      part: RightArmLagomorph
      connections:
      - right hand
    left arm:
      part: LeftArmLagomorph
      connections:
      - left hand
    right hand:
      part: RightHandLagomorph
    left hand:
      part: LeftHandLagomorph
    right leg:
      part: RightLegLagomorph
      connections:
      - right foot
    left leg:
      part: LeftLegLagomorph
      connections:
      - left foot
    right foot:
      part: RightFootLagomorph
    left foot:
      part: LeftFootLagomorph

- type: entity
  id: OrganLagomorphStomach
  parent: [OrganAnimalStomach, BaseOrganStomach]
  name: stomach
  description: "Gross. This is hard to stomach."
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
    state: stomach
  - type: Item
    size: Small
    heldPrefix: stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Metabolizer
    updateInterval: 1.33