- type: constructionGraph
  id: GasTrinary
  start: start
  graph:
  - node: start
    edges:
    # Filter
    - to: filter
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    # region starlight
    - to: filterAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
  
    - to: filterAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
    # end region
  
    - to: filterflipped
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    # region starlight
    - to: filterflippedAlt1
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
  
    - to: filterflippedAlt2
      steps:
      - material: Steel
        amount: 2
        doAfter: 1
    # end region

    # Mixer
    - to: mixer
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: mixerflipped
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

    - to: pneumaticvalve
      steps:
      - material: Steel
        amount: 2
        doAfter: 1

  # Filter
  - node: filter
    entity: GasFilter
    edges:
    - to: start
      conditions:
      - !type:EntityAnchored
        anchored: false
      completed:
      - !type:SpawnPrototype
        prototype: SheetSteel1
        amount: 2
      - !type:DeleteEntity
      steps:
      - tool: Welding
        doAfter: 1
  
  #region starlight
  - node: filterAlt1
